# Discord MCP — service HTTP 24/7 (VPS Allemagne).
# ⚠️ Ce VPS a Docker en iptables:false → bridge NAT/port-mapping CASSÉS. On tourne en RÉSEAU HÔTE.
# ⚠️ Bind sur l'IP Tailscale 100.64.0.1:8788 (PAS 127.0.0.1 : loopback:8788 déjà pris par un service tiers).
# ⚠️ TLS terminé par `tailscale serve` (convention maison du VPS) : https://...ts.net:8449 → http://100.64.0.1:8788.
#    Pas de port public. L'IP Tailscale n'est jointe que via le mesh chiffré ; serve ajoute le cert LE *.ts.net.
#    Mise en place du proxy HTTPS : `tailscale serve --bg --https=8449 http://100.64.0.1:8788` (persiste, survit au reboot).
# ⚠️ Image pré-buildée avec `docker build --network=host` (cf build.sh — DNS conteneur KO sinon).
# ⚠️ Postgres (relais historique V2) = conteneur agent-postgres déjà présent sur ce VPS, à réutiliser.
# ⚠️ MÊME image Node (discord-mcp:latest) pour 3 services (elle contient relay/ ET web/) : chacun surcharge `command`.
#    Doctrine 1-concern/conteneur : discord-mcp (MCP) LIT, discord-relay ÉCRIT, discord-web (API) LIT+AGIT. Couplés par Postgres.
# ⚠️ Client web : API `discord-web` (Fastify 127.0.0.1:8080, interne) + front-door `discord-web-front` (nginx, image
#    séparée, sert le SPA + reverse-proxy /api+/socket.io, bind IP Tailscale:8790). TLS = tailscale serve --https=8451.
#    Ports : 8788=MCP, 8789=publer-mcp (autre service), 8790=web-front · serve 8449=MCP, 8450=publer, 8451=web.
services:
  discord-mcp:
    image: discord-mcp:latest
    container_name: discord-mcp
    restart: unless-stopped
    network_mode: host
    environment:
      DISCORD_MCP_HTTP_HOST: "100.64.0.1"   # IP Tailscale = frontière réseau (mesh privé chiffré)
      DISCORD_MCP_HTTP_PORT: "8788"
      DISCORD_SECRETS_PATH: "/run/secrets/discord.json"
      DISCORD_MCP_HTTP_TOKEN: "${DISCORD_MCP_HTTP_TOKEN}"
      # Host transmis par tailscale serve = le nom MagicDNS. On l'autorise (DNS-rebinding reste ACTIF, jamais désactivé).
      DISCORD_MCP_ALLOWED_HOSTS: "your-node.tailxxxxx.ts.net:8449,your-node.tailxxxxx.ts.net"
      # Lecture historique/recherche (discord_history/discord_search) → base du relais. Le MCP LIT seulement.
      RELAY_DATABASE_URL: "${RELAY_DATABASE_URL}"
    volumes:
      - "/etc/discord-mcp/secrets.json:/run/secrets/discord.json:ro"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8788,'100.64.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # API web (façade SŒUR) : LIT la base relais + AGIT via lib/core (REST). N'ouvre PAS de gateway.
  # ⚠️ MÊME image (elle contient web/) : surcharge juste `command`. Bind 127.0.0.1:8080 = INTERNE
  #    (seul nginx, même hôte, l'atteint). JAMAIS exposée directement : le front-door nginx est la porte.
  discord-web:
    image: discord-mcp:latest
    container_name: discord-web
    restart: unless-stopped
    network_mode: host
    command: ["node", "web/server.js"]
    environment:
      WEB_HOST: "127.0.0.1"
      WEB_PORT: "8080"
      WEB_JWT_SECRET: "${WEB_JWT_SECRET}"   # /opt/discord-mcp/.env (chmod 600) — JAMAIS commité
      RELAY_DATABASE_URL: "${RELAY_DATABASE_URL}"
      WEB_CORS_ORIGIN: ""                    # même origine via nginx → aucune cross-origin
      # ⚠️ OAuth Login Discord (P2b) — OBLIGATOIRES sinon /api/auth/login = 500 "clientId requis".
      #    Valeurs dans /opt/discord-mcp/.env. Déjà perdu 1× (hot-fix VPS non commité écrasé par recreate).
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_OAUTH_REDIRECT_URI: "${DISCORD_OAUTH_REDIRECT_URI}"
      OAUTH_ALLOWED_USER_IDS: "${OAUTH_ALLOWED_USER_IDS}"
      # ⚠️ AGIR via lib/core (envoi messages/DM) = besoin des tokens bots. Sans ce path+volume,
      #    discordCall cherche .secrets.json dans l'image (absent) → tout POST échoue.
      DISCORD_SECRETS_PATH: "/run/secrets/discord.json"
    volumes:
      - "/etc/discord-mcp/secrets.json:/run/secrets/discord.json:ro"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Front-door : sert le SPA statique (build Vite) + reverse-proxy /api + /socket.io → discord-web.
  # ⚠️ Image SÉPARÉE (multi-stage front/Dockerfile, contexte front/) : nginx, pas Node. TLS = tailscale serve.
  discord-web-front:
    image: discord-web-front:latest
    container_name: discord-web-front
    restart: unless-stopped
    network_mode: host                      # bind IP Tailscale 100.64.0.1:8789 (cf nginx.conf)
    depends_on:
      - discord-web

  # Daemon d'ingestion : ouvre les gateways, ÉCRIT dans discord_relay. N'expose AUCUN port.
  discord-relay:
    image: discord-mcp:latest
    container_name: discord-relay
    restart: unless-stopped
    network_mode: host                      # pour joindre agent-postgres sur 127.0.0.1:5432
    command: ["node", "relay/relay-main.js"]
    environment:
      RELAY_DATABASE_URL: "${RELAY_DATABASE_URL}"
      DISCORD_SECRETS_PATH: "/run/secrets/discord.json"
    volumes:
      - "/etc/discord-mcp/secrets.json:/run/secrets/discord.json:ro"
