name: CI

# Repo PRIVÉ. Aucun secret requis : tests offline (REST mocké), fixtures = tokens factices.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (vitest)
    runs-on: ubuntu-latest
    # Service Postgres → les tests de CONTRAT du repository tournent contre un vrai PG (pas que mémoire).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: discord_relay
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: discord_relay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U discord_relay"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      RELAY_DATABASE_URL: postgresql://discord_relay:ci@127.0.0.1:5432/discord_relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  mutation:
    name: Gate mutation (Stryker, break=80)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run mutation   # break=80 → échoue la CI si le score régresse (cliquet)

  docker:
    name: Build image (conteneur-friendly)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      # Prouve que le Dockerfile build sans dépendre du quirk iptables:false du VPS.
      # Pas de push : on vérifie seulement que l'image se construit.
      - run: docker build -t discord-mcp:ci .

  front:
    name: Front (build + vitest)
    runs-on: ubuntu-latest
    # Toolchain front ISOLÉE (React/Vite/jsdom) — indépendante du backend, pas de Postgres.
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
