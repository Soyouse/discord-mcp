# Front-door du client web Discord (conteneur discord-web-front).
# Sert le SPA statique (build Vite) ET reverse-proxy l'API web + Socket.IO → même origine.
# ⚠️ Bind IP TAILSCALE uniquement (JAMAIS 0.0.0.0) : réseau hôte sur ce VPS → 0.0.0.0 exposerait
#    le port sur l'interface publique. Le mesh Tailscale chiffré = la frontière (convention du VPS).
# ⚠️ TLS terminé PAR-DESSUS par `tailscale serve --https=8450 http://100.64.0.1:8789` (cert LE *.ts.net).
# ⚠️ Même origine front↔API (proxy) → AUCUN CORS nécessaire (WEB_CORS_ORIGIN reste '').
server {
    listen 100.64.0.1:8789;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # En-têtes sécurité (le SPA est servi ICI, pas par Fastify qui ne renvoie que du JSON).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets hashés par Vite (/assets/*.[hash].js|css) = immuables → cache long.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API REST → Fastify (web/server.js), même hôte (réseau hôte) sur 127.0.0.1:8080.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (WebSocket) → mêmes en-têtes Upgrade OBLIGATOIRES sinon le handshake WS échoue.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;   # WS longue durée : pas de coupure à 60s
    }

    # SPA : toute route inconnue → index.html (react-router gère côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
